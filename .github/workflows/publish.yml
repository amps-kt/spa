name: "Docker build and push to GHCR"

on:
  push:
    branches:
      - main
      - staging

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
      permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Get current date"
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and push app"
        uses: docker/build-push-action@v5
        with:
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/amps-kt/amps-app:${{ github.ref_name }}-latest
            ghcr.io/amps-kt/amps-app:${{ github.ref_name }}-${{ steps.date.outputs.date }}
            ghcr.io/amps-kt/amps-app:${{ github.ref_name }}-${{ github.sha }}

      - name: "Trigger Staging Pull"
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{ \"secret\": \"${{ secrets.PULL_STAGING_SECRET }}\" }" \
          ${{ secrets.PULL_STAGING_URL }}
